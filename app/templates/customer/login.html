<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 群发管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 1rem; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="card login-card bg-white">
        <div class="text-center mb-4">
            <h4 class="fw-bold text-primary">📢 群发管理后台</h4>
            <p class="text-muted small">Bot Customer Login</p>
        </div>
        
        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/customer/login">
            <div class="mb-3">
                <label class="form-label small text-muted">登录账号</label>
                <input type="text" name="account" class="form-control" value="{{ account }}" required autofocus placeholder="请输入管理员分配的账号或 Bot ID">
            </div>
            <div class="mb-4">
                <label class="form-label small text-muted">管理密码</label>
                <input type="password" name="password" class="form-control" required placeholder="请输入管理密码">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">登 录</button>
        </form>
    </div>
</body>
</html>
